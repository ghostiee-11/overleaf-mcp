name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest -v

  test-with-texlive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - name: Install TeX Live basics
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra chktex latexmk
      - run: uv sync --extra dev
      - run: uv run pytest -v
